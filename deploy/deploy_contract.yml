---
- name: Run deploy contract
  hosts: localhost
  connection: local
  gather_facts: yes

  tasks:
    - name: Run Maven
      command: 'mvn clean package -DskipTests spring-boot:run -q'
      register: mvn_output
      args:
        chdir: "../backend/"

    - name: Print Maven output
      debug:
        msg: "{{ mvn_output.stdout_lines }}"
